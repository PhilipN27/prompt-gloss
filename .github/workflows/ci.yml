name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager"; do not also set
      # `version` here or action-setup errors on the duplicate source.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Matcher eval (golden set)
        run: pnpm eval:matcher

      - name: E2E (Playwright, fake-agent mode)
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e

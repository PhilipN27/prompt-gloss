name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager"; do not also set
      # `version` here or action-setup errors on the duplicate source.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Node 22: pnpm 11 (pinned via packageManager) requires Node >= 22.13.
      # This honors the repo's engines ">=20"; TESTING.md's "Node 20" predates
      # the pnpm 11 pin. See the impl report's spec-clarifications note.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Matcher eval (golden set)
        run: pnpm eval:matcher

      - name: E2E (Playwright, fake-agent mode)
        run: |
          pnpm --filter @prompt-gloss/web exec playwright install --with-deps chromium
          pnpm test:e2e

  # Cross-platform merge gate for the terminal injection path (TESTING.md CI
  # section): the hook bundle runs on users' machines in three OS flavors, so
  # this is the only matrix job. The CLI suite joins it in Phase B.
  hook-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Hook contract tests (real bundle)
        run: pnpm test:hook

      - name: CLI tests (init/uninstall settings merge, add/log/doctor)
        run: pnpm test:cli

  # Real VS Code extension-host coverage. Linux needs a virtual display for
  # Electron; local Windows/macOS runs stay headed and invoke test:vscode
  # directly.
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter gloss-terminal build

      - name: Extension tests (real VS Code)
        run: xvfb-run -a pnpm --filter gloss-terminal test:vscode
